<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" fill="none" role="img" aria-label="Muntem un curs de sardanes?">
  <rect width="1080" height="1350" fill="#ff8201" />

  <!-- Title -->
  <text x="540" y="220" text-anchor="middle" fill="#141414"
    font-family="'Londrina Solid', 'Arial Black', system-ui, sans-serif"
    font-weight="900" font-size="72" letter-spacing="2">MUNTEM UN CURS DE</text>
  <text x="540" y="360" text-anchor="middle" fill="#141414"
    font-family="'Londrina Solid', 'Arial Black', system-ui, sans-serif"
    font-weight="900" font-size="176" letter-spacing="4">SARDANES</text>

  <!-- Dancing ninos in a ring (sardana), thick black outline, empty interior -->
  <g fill="none" stroke="#141414" stroke-linecap="round" stroke-linejoin="round">

    <!-- Nino A (left) -->
    <g transform="translate(330 900) rotate(-6)">
      <path stroke-width="28" d="M 0,-105 C 55,-108 88,-70 86,-20 C 84,25 92,55 70,85 C 45,118 -45,118 -70,85 C -92,55 -84,25 -86,-20 C -88,-70 -55,-108 0,-105 Z" />
      <path stroke-width="28" d="M -68,-30 C -95,-72 -112,-112 -124,-152" />
      <path stroke-width="28" d="M 68,-30 C 96,-70 112,-108 124,-146" />
      <path stroke-width="28" d="M -30,108 C -40,150 -30,176 -56,196" />
      <path stroke-width="28" d="M 30,108 C 46,146 72,150 94,134" />
      <ellipse stroke-width="18" cx="-26" cy="-46" rx="16" ry="22" />
      <ellipse stroke-width="18" cx="26" cy="-46" rx="16" ry="22" />
    </g>

    <!-- Nino B (center, taller) -->
    <g transform="translate(540 862) rotate(4) scale(1.06)">
      <path stroke-width="28" d="M 0,-105 C 55,-108 88,-70 86,-20 C 84,25 92,55 70,85 C 45,118 -45,118 -70,85 C -92,55 -84,25 -86,-20 C -88,-70 -55,-108 0,-105 Z" />
      <path stroke-width="28" d="M -68,-30 C -98,-74 -114,-118 -122,-160" />
      <path stroke-width="28" d="M 68,-30 C 98,-74 114,-118 122,-160" />
      <path stroke-width="28" d="M -30,108 C -44,148 -66,156 -88,140" />
      <path stroke-width="28" d="M 30,108 C 44,148 66,156 88,140" />
      <ellipse stroke-width="18" cx="-26" cy="-46" rx="16" ry="22" />
      <ellipse stroke-width="18" cx="26" cy="-46" rx="16" ry="22" />
    </g>

    <!-- Nino C (right, mirrored) -->
    <g transform="translate(750 900) scale(-1 1) rotate(-6)">
      <path stroke-width="28" d="M 0,-105 C 55,-108 88,-70 86,-20 C 84,25 92,55 70,85 C 45,118 -45,118 -70,85 C -92,55 -84,25 -86,-20 C -88,-70 -55,-108 0,-105 Z" />
      <path stroke-width="28" d="M -68,-30 C -95,-72 -112,-112 -124,-152" />
      <path stroke-width="28" d="M 68,-30 C 96,-70 112,-108 124,-146" />
      <path stroke-width="28" d="M -30,108 C -40,150 -30,176 -56,196" />
      <path stroke-width="28" d="M 30,108 C 46,146 72,150 94,134" />
      <ellipse stroke-width="18" cx="-26" cy="-46" rx="16" ry="22" />
      <ellipse stroke-width="18" cx="26" cy="-46" rx="16" ry="22" />
    </g>

    <!-- Energy sparkles -->
    <g stroke-width="14">
      <path d="M 210,560 C 214,548 214,548 210,536" />
      <path d="M 198,548 C 210,552 210,552 222,548" />
      <path d="M 880,600 C 884,586 884,586 880,572" />
      <path d="M 866,586 C 880,590 880,590 894,586" />
      <path d="M 540,1120 C 545,1104 545,1104 540,1088" />
      <path d="M 524,1104 C 540,1109 540,1109 556,1104" />
    </g>
  </g>

  <!-- Subtitle -->
  <text x="540" y="1230" text-anchor="middle" fill="#141414"
    font-family="'Londrina Solid', 'Arial Black', system-ui, sans-serif"
    font-weight="900" font-size="58" letter-spacing="1">DIGUES-HI LA TEVA</text>
</svg>
